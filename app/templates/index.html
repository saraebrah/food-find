<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FoodFind</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
    <script src="{{ url_for('static', path='/search.js') }}" defer></script>
  </head>
  <body>
    <main>
      <header class="hero">
        <p class="eyebrow">Phase 2</p>
        <h1>FoodFind</h1>
        <p class="intro">Nearby food discovery starts here.</p>
      </header>

      <section class="search-panel" aria-labelledby="search-heading">
        <div class="search-copy">
          <h2 id="search-heading">Choose a location</h2>
          <p id="location-help">
            Start typing a place or address, or enter decimal coordinates as latitude, longitude.
            Then choose how far around it to search.
          </p>
        </div>
        <div class="search-controls">
          <div class="search-action">
            <div class="location-control">
              <label for="location-input">Location</label>
              <input
                id="location-input"
                name="location"
                type="text"
                inputmode="search"
                autocomplete="off"
                spellcheck="false"
                aria-describedby="location-help"
                aria-autocomplete="list"
                aria-controls="location-suggestions"
                aria-expanded="false"
                role="combobox"
                value="43.6532, -79.3832"
              />
              <div id="suggestions-panel" class="suggestions-panel" hidden>
                <ul
                  id="location-suggestions"
                  class="location-suggestions"
                  role="listbox"
                ></ul>
                <p class="google-maps-attribution" translate="no">Google Maps</p>
              </div>
            </div>
            <div class="radius-control">
              <label for="radius-select">Radius</label>
              <select id="radius-select" name="radius">
                <option value="500">500 m</option>
                <option value="1000" selected>1 km</option>
                <option value="2000">2 km</option>
                <option value="5000">5 km</option>
              </select>
            </div>
            <button id="search-button" type="button">Search</button>
          </div>
        </div>
      </section>

      <p id="search-status" class="search-status" role="status" aria-live="polite">
        Select search when you are ready.
      </p>

      <section id="results-section" aria-labelledby="results-heading" hidden>
        <div class="results-heading">
          <h2 id="results-heading">Places</h2>
          <p id="result-count"></p>
        </div>
        <ul id="place-results" class="place-results"></ul>
      </section>

      <noscript>JavaScript is required to run the place search.</noscript>
    </main>
  </body>
</html>
